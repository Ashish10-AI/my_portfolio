<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Case Study &mdash; Ashish</title>
  <meta name="description" content="Case study by Ashish &mdash; Creative Technologist" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="case-study.css" />
</head>
<!--
  HOW TO CREATE A NEW PROJECT PAGE:
  1. Duplicate this file
  2. Rename it to match the project ID in projects-data.js
     e.g. my-new-project.html
  3. Add the project data in projects-data.js
  4. Change data-project="..." below to your project ID
  5. Done! The template auto-renders everything.
-->

<body data-project="YOUR_PROJECT_ID_HERE">

  <!-- PAGE TRANSITION OVERLAY -->
  <div id="page-transition" class="page-transition-overlay">
    <div class="transition-content">
      <div class="transition-num"></div>
      <div class="transition-label"></div>
    </div>
  </div>

  <!-- BACK BUTTON -->
  <a href="../index.html#projects" class="cs-back" id="cs-back">
    <span class="back-arrow">&larr;</span> Back to Work
  </a>

  <!-- HERO -->
  <section id="cs-hero" class="cs-hero">
    <div class="cs-hero-bg">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
    </div>
    <div class="cs-container">
      <div class="cs-hero-content cs-sr">
        <div class="cs-hero-meta">
          <span id="cs-hero-num" class="cs-hero-num"></span>
          <span id="cs-hero-cat" class="cs-hero-cat"></span>
        </div>
        <h1 id="cs-hero-title" class="cs-hero-title"></h1>
        <p id="cs-hero-tagline" class="cs-hero-tagline"></p>
        <div id="cs-tech-stack" class="cs-tech-stack"></div>
      </div>
    </div>
  </section>

  <!-- COVER IMAGE -->
  <div class="cs-cover cs-sr d2">
    <div class="cs-container-wide">
      <div id="cs-cover-inner" class="cs-cover-inner">
        <div class="cs-cover-grid"></div>
        <div class="cs-cover-emoji"></div>
        <div class="cs-cover-glow"></div>
      </div>
    </div>
  </div>

  <!-- PROBLEM -->
  <section class="cs-section">
    <div class="cs-container">
      <div id="cs-problem-label" class="cs-section-label cs-sr">The Challenge</div>
      <h2 id="cs-problem-title" class="cs-section-title cs-sr d1"></h2>
      <div id="cs-problem-line" class="cs-section-line cs-sr d2"></div>
      <p id="cs-problem-text" class="cs-section-text cs-sr d3"></p>
    </div>
  </section>

  <!-- SOLUTION -->
  <section class="cs-section">
    <div class="cs-container">
      <div id="cs-solution-label" class="cs-section-label cs-sr">The Approach</div>
      <h2 id="cs-solution-title" class="cs-section-title cs-sr d1"></h2>
      <div id="cs-solution-line" class="cs-section-line cs-sr d2"></div>
      <p id="cs-solution-text" class="cs-section-text cs-sr d3"></p>
    </div>
  </section>

  <!-- TOOLS & TECHNOLOGIES -->
  <section class="cs-section" style="background:var(--bg1);">
    <div class="cs-container">
      <div id="cs-tools-label" class="cs-section-label cs-sr">Stack Used</div>
      <h2 class="cs-section-title cs-sr d1">Tools &amp; Technologies</h2>
      <div id="cs-tools-line" class="cs-section-line cs-sr d2"></div>
      <div id="cs-tools-grid" class="cs-tools-grid"></div>
    </div>
  </section>

  <!-- RESULTS -->
  <section class="cs-section">
    <div class="cs-container">
      <div id="cs-results-label" class="cs-section-label cs-sr">Impact</div>
      <h2 class="cs-section-title cs-sr d1">Results &amp; Numbers</h2>
      <div id="cs-results-line" class="cs-section-line cs-sr d2"></div>
      <div id="cs-results-grid" class="cs-results-grid"></div>
    </div>
  </section>

  <!-- SCREENSHOTS / PREVIEW -->
  <section class="cs-section" style="background:var(--bg1);">
    <div class="cs-container">
      <div class="cs-section-label purple cs-sr">Visuals</div>
      <h2 class="cs-section-title cs-sr d1">Screenshots &amp; Preview</h2>
      <div class="cs-section-line purple cs-sr d2"></div>
      <div id="cs-gallery" class="cs-gallery"></div>
    </div>
  </section>

  <!-- CTA BUTTONS -->
  <div class="cs-container">
    <div id="cs-cta-row" class="cs-cta-row cs-sr"></div>
  </div>

  <div class="cs-sep"></div>

  <!-- PREV / NEXT NAVIGATION -->
  <div class="cs-container">
    <nav class="cs-nav">
      <a id="cs-prev" href="#" class="cs-nav-link">
        <span class="cs-nav-label">&larr; Previous Project</span>
        <span class="cs-nav-title"></span>
      </a>
      <a id="cs-next" href="#" class="cs-nav-link" style="text-align:right;">
        <span class="cs-nav-label">Next Project &rarr;</span>
        <span class="cs-nav-title"></span>
      </a>
    </nav>
  </div>

  <!-- FOOTER -->
  <footer class="cs-footer">
    <div class="cs-container">
      <div class="cs-footer-logo">Ashish.</div>
      <div class="cs-footer-copy">&copy; 2025 Ashish &middot; All rights reserved</div>
    </div>
  </footer>

  <!-- SCRIPTS -->
  <script src="projects-data.js"></script>
  <script src="case-study.js"></script>
</body>

</html>
